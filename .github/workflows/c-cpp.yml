name: Build and Test Chess Engine

on:
  push:
    paths:
      - "**/*.cpp"

  pull_request:
    paths:
      - "**/*.cpp"


jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install raylib
        run: brew install raylib

      - name: Compile chess engine
        run: |
          clang++ -std=c++20 -O2 \
            main.cpp \
            -o main \
            -I"$(brew --prefix raylib)/include" \
            -L"$(brew --prefix raylib)/lib" \
            -lraylib \
            -framework IOKit \
            -framework Cocoa \
            -framework OpenGL

      - name: Compile tests
        run: |
          clang++ -std=c++20 -O2 \
            tests/test_main.cpp \
            -I"$(brew --prefix raylib)/include" \
            -L"$(brew --prefix raylib)/lib" \
            -lraylib \
            -framework IOKit \
            -framework Cocoa \
            -framework OpenGL \
            -o tests_run

      - name: Run tests
        run: ./tests_run